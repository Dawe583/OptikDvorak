<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 184 84" fill="none" role="img" aria-label="Optik Dvořák — oční optika">
  <title>Optik Dvořák</title>
  <!-- kulaté čočky (monoline, ink) -->
  <circle cx="56" cy="44" r="26" stroke="#141414" stroke-width="5"/>
  <circle cx="128" cy="44" r="26" stroke="#141414" stroke-width="5"/>
  <!-- most (žlutý akcent) -->
  <path d="M83 39c6-8 12-8 18 0" stroke="#F5C518" stroke-width="5" stroke-linecap="round"/>
  <!-- stranice -->
  <path d="M32 35 12 27" stroke="#141414" stroke-width="5" stroke-linecap="round"/>
  <path d="M152 35 172 27" stroke="#141414" stroke-width="5" stroke-linecap="round"/>
  <!-- světelný odlesk v čočce (jemný, tematicky „optika/světlo") -->
  <path d="M43 34c4-6 10-10 16-11" stroke="#F5C518" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
</svg>
