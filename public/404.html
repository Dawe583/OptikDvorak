<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stránka nenalezena — Optik Dvořák</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/webp" href="/img/favicon.webp" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #F4F1EA;
      color: #141414;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .num {
      font-size: clamp(6rem, 24vw, 16rem);
      font-weight: 750;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #6B6B66;
    }
    .num em { font-style: normal; color: #FFE45C; -webkit-text-stroke: 2px #141414; }
    h1 { font-size: clamp(1.3rem, 3vw, 2rem); margin: 1rem 0 0.6rem; text-transform: uppercase; letter-spacing: -0.01em; }
    p { color: #55534E; max-width: 42ch; margin-inline: auto; line-height: 1.6; }
    a.btn {
      display: inline-flex;
      margin-top: 2rem;
      padding: 0.9rem 1.7rem;
      border: 1px solid #141414;
      color: #141414;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.25s ease, color 0.25s ease;
    }
    a.btn:hover { background: #141414; color: #F4F1EA; }
  </style>
</head>
<body>
  <main>
    <p class="num">4<em>0</em>4</p>
    <h1>Tuhle stránku nevidíme ani my</h1>
    <p>A to máme na oči vybavení. Stránka neexistuje, nebo se přestěhovala. Zkuste to z hlavní stránky.</p>
    <a class="btn" href="/">Zpět na hlavní stránku ↗</a>
  </main>
</body>
</html>
